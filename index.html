<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>聊天</title>
<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="聊天">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06C755">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --green:#06C755; --green-dark:#05b34c; --green-light:#e8fdf0;
    --bg:#ece5dd; --white:#fff;
    --text:#1a1a1a; --sub:#888; --border:#e8e8e8;
  }
  html,body { height:100%; overflow:hidden; font-family:'Noto Sans TC',sans-serif; background:var(--bg); }

/* ===== PAGES ===== */
.page { position:fixed; inset:0; display:flex; flex-direction:column; background:#fff; transition:transform .3s ease; }
.page.hidden { transform:translateX(100%); }

/* ===== CONTACT LIST PAGE ===== */
#listPage { background:#fff; }

.top-bar {
background:var(–green); padding:14px 16px 10px;
padding-top: calc(14px + env(safe-area-inset-top));
display:flex; align-items:center; justify-content:space-between;
}
.top-bar h1 { color:#fff; font-size:22px; font-weight:700; letter-spacing:1px; }
.top-bar-icons { display:flex; gap:8px; }
.top-icon { background:rgba(255,255,255,0.2); border:none; border-radius:50%; width:36px; height:36px;
display:flex; align-items:center; justify-content:center; font-size:17px; cursor:pointer; color:#fff; }

.search-wrap { padding:10px 12px; background:#f5f5f5; border-bottom:1px solid var(–border); }
.search-wrap input {
width:100%; padding:9px 14px; border-radius:20px; border:1px solid #ddd;
font-size:14px; outline:none; background:#fff; font-family:inherit;
}
.search-wrap input:focus { border-color:var(–green); }

.contact-list { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.contact-item {
display:flex; align-items:center; gap:12px; padding:13px 16px;
border-bottom:1px solid #f2f2f2; cursor:pointer; transition:background .1s;
-webkit-user-select:none; user-select:none;
}
.contact-item:active { background:#f0f0f0; }

.av {
width:52px; height:52px; border-radius:50%; flex-shrink:0;
display:flex; align-items:center; justify-content:center;
font-size:24px; font-weight:700; color:#fff;
}
.av.c1 { background:linear-gradient(135deg,#FF6B6B,#ee5a24); }
.av.c2 { background:linear-gradient(135deg,#4ECDC4,#1abc9c); }
.av.c3 { background:linear-gradient(135deg,#a29bfe,#6c5ce7); }
.av.c4 { background:linear-gradient(135deg,#fd9644,#e67e22); }
.av.c5 { background:linear-gradient(135deg,#fd79a8,#e84393); }

.ci-info { flex:1; min-width:0; }
.ci-name { font-size:15px; font-weight:600; margin-bottom:3px; }
.ci-preview { font-size:13px; color:var(–sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ci-meta { text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
.ci-time { font-size:11px; color:var(–sub); }
.badge { background:var(–green); color:#fff; font-size:11px; font-weight:700;
border-radius:10px; min-width:20px; height:20px; display:flex; align-items:center; justify-content:center; padding:0 5px; }

/* ===== CHAT PAGE ===== */
#chatPage { background:var(–bg); }

.chat-header {
background:#fff; padding:12px 12px 10px;
padding-top: calc(12px + env(safe-area-inset-top));
display:flex; align-items:center; gap:10px;
border-bottom:1px solid var(–border);
box-shadow:0 1px 4px rgba(0,0,0,0.07);
}
.back-btn { background:none; border:none; font-size:24px; cursor:pointer; color:var(–green); padding:2px 6px 2px 0; }
.ch-av { width:40px; height:40px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:20px; color:#fff; }
.ch-info { flex:1; }
.ch-name { font-size:16px; font-weight:700; }
.ch-status { font-size:12px; color:var(–green); }
.ch-actions { display:flex; gap:4px; }
.ch-btn { background:none; border:none; font-size:20px; cursor:pointer; color:#666; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.ch-btn:active { background:#f0f0f0; }

.messages {
flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
padding:16px 12px; display:flex; flex-direction:column; gap:6px;
}

.date-div { text-align:center; font-size:11px; color:#777; background:rgba(255,255,255,0.75);
display:inline-block; margin:6px auto; padding:3px 12px; border-radius:10px; align-self:center; }

.msg-row { display:flex; align-items:flex-end; gap:6px; }
.msg-row.me { flex-direction:row-reverse; }

.msg-av { width:32px; height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; color:#fff; }
.msg-row.me .msg-av { display:none; }

.msg-col { max-width:72%; display:flex; flex-direction:column; gap:2px; }
.msg-row.me .msg-col { align-items:flex-end; }
.msg-sender { font-size:11px; color:var(–sub); padding-left:4px; margin-bottom:1px; }

.bubble {
padding:9px 13px; border-radius:18px; font-size:14px; line-height:1.55;
word-break:break-word; box-shadow:0 1px 2px rgba(0,0,0,0.1);
}
.bubble.them { background:#fff; border-bottom-left-radius:4px; color:var(–text); }
.bubble.me   { background:var(–green); border-bottom-right-radius:4px; color:#fff; }
.bubble.big  { background:transparent!important; box-shadow:none; font-size:38px; padding:4px 6px; }

.msg-meta { display:flex; align-items:center; gap:3px; padding:0 4px; }
.msg-time { font-size:10px; color:var(–sub); }
.read { font-size:10px; color:var(–green); font-weight:700; }

/* typing indicator */
.typing-bubble { display:flex; align-items:center; gap:4px; padding:10px 14px; background:#fff; border-radius:18px; border-bottom-left-radius:4px; box-shadow:0 1px 2px rgba(0,0,0,0.1); width:fit-content; }
.dot { width:7px; height:7px; background:#bbb; border-radius:50%; animation:bounce .9s infinite ease-in-out; }
.dot:nth-child(2){ animation-delay:.15s; }
.dot:nth-child(3){ animation-delay:.3s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg-row { animation:fadeUp .2s ease; }

/* ===== INPUT ===== */
.input-area {
background:#fff; border-top:1px solid var(–border);
padding:8px 8px;
padding-bottom: calc(8px + env(safe-area-inset-bottom));
flex-shrink:0;
}
.emoji-tray { display:none; flex-wrap:wrap; gap:2px; padding:6px 0 4px; }
.emoji-tray.open { display:flex; }
.ep { background:none; border:none; font-size:24px; cursor:pointer; padding:3px; border-radius:6px; }
.ep:active { background:#f0f0f0; }

.input-row { display:flex; align-items:flex-end; gap:4px; width:100%; }
.ia-btn { background:none; border:none; font-size:20px; cursor:pointer; width:32px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#666; flex-shrink:0; }
.ia-btn:active { background:#f0f0f0; }
.ia-btn.on { color:var(–green); }

.inp-wrap { flex:1; min-width:0; background:#f5f5f5; border:1.5px solid #e0e0e0; border-radius:22px;
padding:8px 12px; display:flex; align-items:center; transition:border .2s; min-height:40px; }
.inp-wrap:focus-within { border-color:var(–green); background:#fff; }
.inp { flex:1; min-width:0; border:none; outline:none; background:transparent; font-family:inherit; font-size:14px; resize:none; max-height:90px; line-height:1.5; color:var(–text); }
.inp::placeholder { color:#bbb; }

.send { width:38px; height:38px; border-radius:50%; background:var(–green); border:none;
display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff;
cursor:pointer; flex-shrink:0; transition:background .15s, transform .1s; }
.send:active { background:var(–green-dark); transform:scale(.9); }

/* Bottom nav placeholder */
.bottom-nav {
background:#fff; border-top:1px solid var(–border);
display:flex; padding:8px 0;
padding-bottom: calc(8px + env(safe-area-inset-bottom));
}
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
background:none; border:none; cursor:pointer; font-size:22px; }
.nav-btn span { font-size:10px; color:var(–sub); }
.nav-btn.active span { color:var(–green); }
</style>

</head>
<body>

<!-- ===== LIST PAGE ===== -->

<div class="page" id="listPage">
  <div class="top-bar">
    <h1>LINE</h1>
    <div class="top-bar-icons">
      <button class="top-icon">➕</button>
      <button class="top-icon">⚙️</button>
    </div>
  </div>
  <div class="search-wrap">
    <input type="text" placeholder="🔍  搜尋" id="searchInput" oninput="filterContacts(this.value)">
  </div>
  <div class="contact-list" id="contactList"></div>
  <div class="bottom-nav">
    <button class="nav-btn active"><span style="font-size:22px">💬</span><span style="color:var(--green)">聊天</span></button>
    <button class="nav-btn"><span style="font-size:22px">📞</span><span>通話</span></button>
    <button class="nav-btn"><span style="font-size:22px">🏠</span><span>動態</span></button>
    <button class="nav-btn"><span style="font-size:22px">🔍</span><span>探索</span></button>
    <button class="nav-btn"><span style="font-size:22px">👤</span><span>我</span></button>
  </div>
</div>

<!-- ===== CHAT PAGE ===== -->

<div class="page hidden" id="chatPage">
  <div class="chat-header" id="chatHeader"></div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="emoji-tray" id="emojiTray">
      <button class="ep" onclick="insertEmoji('😀')">😀</button>
      <button class="ep" onclick="insertEmoji('😂')">😂</button>
      <button class="ep" onclick="insertEmoji('🥰')">🥰</button>
      <button class="ep" onclick="insertEmoji('😎')">😎</button>
      <button class="ep" onclick="insertEmoji('😭')">😭</button>
      <button class="ep" onclick="insertEmoji('🤔')">🤔</button>
      <button class="ep" onclick="insertEmoji('👍')">👍</button>
      <button class="ep" onclick="insertEmoji('❤️')">❤️</button>
      <button class="ep" onclick="insertEmoji('🔥')">🔥</button>
      <button class="ep" onclick="insertEmoji('🎉')">🎉</button>
      <button class="ep" onclick="insertEmoji('😅')">😅</button>
      <button class="ep" onclick="insertEmoji('🙏')">🙏</button>
      <button class="ep" onclick="insertEmoji('💪')">💪</button>
      <button class="ep" onclick="insertEmoji('✨')">✨</button>
      <button class="ep" onclick="insertEmoji('🤣')">🤣</button>
      <button class="ep" onclick="insertEmoji('😊')">😊</button>
      <button class="ep" onclick="insertEmoji('👏')">👏</button>
      <button class="ep" onclick="insertEmoji('🥳')">🥳</button>
      <button class="ep" onclick="insertEmoji('😤')">😤</button>
      <button class="ep" onclick="insertEmoji('🫶')">🫶</button>
    </div>
    <div class="input-row">
      <button class="ia-btn" id="emojiToggle" onclick="toggleEmoji()">😊</button>
      <button class="ia-btn">🖼️</button>
      <div class="inp-wrap">
        <textarea class="inp" id="msgInput" placeholder="輸入訊息…" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="ia-btn">➕</button>
      <button class="send" onclick="sendMsg()">▶</button>
    </div>
  </div>
</div>

<script>
const contacts = [
  { id:1, name:'小美', cls:'c1', emoji:'🐱', status:'線上', preview:'好的，等一下見！', time:'剛剛', badge:2 },
  { id:2, name:'阿志', cls:'c2', emoji:'🦁', status:'線上', preview:'哈哈哈哈哈哈哈', time:'5分鐘', badge:0 },
  { id:3, name:'家族群組', cls:'c3', emoji:'👨‍👩‍👧', status:'5 人', preview:'媽媽：晚餐吃什麼？', time:'12:30', badge:5 },
  { id:4, name:'同事小林', cls:'c4', emoji:'🦊', status:'剛離線', preview:'報告傳給你了', time:'昨天', badge:0 },
  { id:5, name:'大學同學群', cls:'c5', emoji:'🎓', status:'12 人', preview:'下週要聚餐嗎？', time:'週一', badge:1 },
];

const histories = {
  1:[
    {me:false,text:'嗨！你今天有空嗎？',time:'10:00'},
    {me:true,text:'有啊！你想幹嘛？',time:'10:01'},
    {me:false,text:'下午想去喝咖啡，你要來嗎 ☕',time:'10:02'},
    {me:true,text:'好啊！幾點？去哪裡？',time:'10:03'},
    {me:false,text:'三點，那家新開的日系咖啡廳',time:'10:05'},
    {me:true,text:'👍',time:'10:05'},
    {me:false,text:'好的，等一下見！',time:'10:06'},
  ],
  2:[
    {me:false,text:'昨天那部電影怎麼樣？',time:'09:00'},
    {me:true,text:'超好看！結局完全沒想到',time:'09:01'},
    {me:false,text:'哈哈哈哈哈哈哈',time:'09:02'},
  ],
  3:[
    {me:false,text:'爸爸：今天幾點回來？',time:'11:00',name:'爸爸'},
    {me:true,text:'晚上七點左右',time:'11:01'},
    {me:false,text:'媽媽：晚餐吃什麼？',time:'12:30',name:'媽媽'},
  ],
  4:[
    {me:false,text:'那份季報報告傳給你了，麻煩確認一下',time:'昨天 17:00'},
    {me:true,text:'收到，等一下看',time:'昨天 17:05'},
    {me:false,text:'報告傳給你了',time:'昨天 18:00'},
  ],
  5:[
    {me:false,text:'暑假快到了！',time:'週一 09:00',name:'志偉'},
    {me:false,text:'下週要聚餐嗎？',time:'週一 09:01',name:'阿芬'},
    {me:true,text:'我可以！什麼時候？',time:'週一 09:10'},
  ],
};

let current = null;

function renderContacts(list) {
  document.getElementById('contactList').innerHTML = list.map(c=>`
    <div class="contact-item" onclick="openChat(${c.id})">
      <div class="av ${c.cls}">${c.emoji}</div>
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-preview">${c.preview}</div>
      </div>
      <div class="ci-meta">
        <div class="ci-time">${c.time}</div>
        ${c.badge?`<div class="badge">${c.badge}</div>`:''}
      </div>
    </div>
  `).join('');
}

function filterContacts(q) {
  renderContacts(contacts.filter(c=>c.name.includes(q)||c.preview.includes(q)));
}

function openChat(id) {
  current = contacts.find(c=>c.id===id);
  current.badge = 0;
  renderContacts(contacts);

  // Header
  document.getElementById('chatHeader').innerHTML = `
    <button class="back-btn" onclick="goBack()">‹</button>
    <div class="ch-av ${current.cls}">${current.emoji}</div>
    <div class="ch-info">
      <div class="ch-name">${current.name}</div>
      <div class="ch-status">${current.status}</div>
    </div>
    <div class="ch-actions">
      <button class="ch-btn">📞</button>
      <button class="ch-btn">📹</button>
    </div>
  `;

  // Messages
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="date-div">今天</div>';
  (histories[id]||[]).forEach(m=>appendBubble(m, false));
  msgs.scrollTop = msgs.scrollHeight;

  // Show chat page
  document.getElementById('chatPage').classList.remove('hidden');
  document.getElementById('msgInput').focus();
}

function goBack() {
  document.getElementById('chatPage').classList.add('hidden');
  document.getElementById('emojiTray').classList.remove('open');
}

function appendBubble(msg, anim=true) {
  const msgs = document.getElementById('messages');
  const big = /^[\p{Emoji}\s]+$/u.test(msg.text) && msg.text.trim().length <= 4;
  const row = document.createElement('div');
  row.className = 'msg-row' + (msg.me ? ' me' : '');

  // Avatar (only for other person)
  if (!msg.me) {
    const av = document.createElement('div');
    av.className = 'msg-av ' + current.cls;
    av.textContent = current.emoji;
    row.appendChild(av);
  }

  const col = document.createElement('div');
  col.className = 'msg-col';

  // Sender name (group chats)
  if (!msg.me && msg.name) {
    const sn = document.createElement('div');
    sn.className = 'msg-sender';
    sn.textContent = msg.name;
    col.appendChild(sn);
  }

  // Bubble
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (msg.me ? 'me' : 'them') + (big ? ' big' : '');
  bubble.textContent = msg.text;
  col.appendChild(bubble);

  // Meta (time + read)
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  if (msg.me) {
    const read = document.createElement('span');
    read.className = 'read';
    read.textContent = '已讀';
    meta.appendChild(read);
  }
  const time = document.createElement('span');
  time.className = 'msg-time';
  time.textContent = msg.time;
  meta.appendChild(time);
  col.appendChild(meta);

  row.appendChild(col);
  msgs.appendChild(row);
  if(anim) msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row'; row.id = 'typingRow';
  row.innerHTML = `
    <div class="msg-av ${current.cls}">${current.emoji}</div>
    <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  `;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMsg() {
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if(!text || !current) return;
  const now = new Date();
  const t = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  appendBubble({me:true, text, time:t});
  inp.value=''; inp.style.height='auto';

  setTimeout(showTyping, 600);
  const replies=['哈哈，好的！','收到了 👍','等一下！','你說得對耶','嗯嗯，我知道了','好啊！','😂😂','等我一下～','真的假的！','沒問題！'];
  setTimeout(()=>{
    const tr = document.getElementById('typingRow');
    if(tr) tr.remove();
    appendBubble({me:false, text:replies[Math.floor(Math.random()*replies.length)], time:t});
  }, 1800 + Math.random()*800);
}

function handleKey(e) {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }
function toggleEmoji() {
  document.getElementById('emojiTray').classList.toggle('open');
  document.getElementById('emojiToggle').classList.toggle('on');
}
function insertEmoji(e) {
  const inp = document.getElementById('msgInput');
  inp.value += e; inp.focus();
}

renderContacts(contacts);
</script>

</body>
</html>
<script>
// 產生 App 圖示
(function(){
  try {
    const c = document.createElement('canvas');
    c.width = c.height = 192;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0,0,192,192);
    g.addColorStop(0,'#06C755'); g.addColorStop(1,'#04a845');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(0,0,192,192,40);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(96,86,62,50,0,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(68,126); ctx.lineTo(56,150); ctx.lineTo(92,128);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#06C755';
    [70,96,122].forEach(x=>{
      ctx.beginPath(); ctx.arc(x,86,8,0,Math.PI*2); ctx.fill();
    });
    const url = c.toDataURL();
    const lnk = document.createElement('link');
    lnk.rel='apple-touch-icon'; lnk.href=url;
    document.head.appendChild(lnk);
  } catch(e){}
})();
</script>
