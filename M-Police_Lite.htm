<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-Police 戰術終端 V1.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --police-blue: #001a33;
            --tactical-green: #00ff41;
            --warning-red: #ff3e3e;
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; }
        body { background: var(--bg-dark); color: white; overflow: hidden; height: 100vh; }

        /* 頂部勤務狀態 */
        .status-bar {
            background: var(--police-blue);
            padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--tactical-green);
            font-family: 'Share Tech Mono', monospace;
            z-index: 100; position: relative;
        }

        .duty-info span { color: var(--tactical-green); font-weight: bold; }

        /* 地圖容器 */
        #map-container {
            width: 100%; height: calc(100vh - 180px);
            position: relative; background: #111;
        }

        #map { width: 100%; height: 100%; }

        /* 雷達掃描動畫 */
        .radar-overlay {
            position: absolute; top: 50%; left: 50%;
            width: 200px; height: 200px;
            border: 1px solid var(--tactical-green);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; opacity: 0.3;
            background: radial-gradient(circle, rgba(0,255,65,0.1) 0%, transparent 70%);
        }
        .radar-overlay::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-top: 2px solid var(--tactical-green);
            border-radius: 50%; animation: rotate 2s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 查詢面板 */
        .query-panel {
            position: fixed; bottom: 0; width: 100%;
            background: var(--panel-bg);
            padding: 15px; border-top: 1px solid rgba(0, 255, 65, 0.3);
            backdrop-filter: blur(10px); z-index: 110;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input {
            flex: 1; background: #000; border: 1px solid var(--tactical-green);
            color: var(--tactical-green); padding: 12px; border-radius: 5px;
            font-size: 16px; outline: none;
        }
        button {
            background: var(--tactical-green); color: black;
            border: none; padding: 10px 20px; border-radius: 5px;
            font-weight: bold; cursor: pointer;
        }

        /* 模擬結果顯示 */
        #result-display {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px; min-height: 20px; color: #aaa;
        }
        .alert { color: var(--warning-red); animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="status-bar">
    <div class="duty-info">ID: <span>D-01762</span> | UNIT: <span>BLACK-TECH</span></div>
    <div id="timer">00:00:00</div>
</div>

<div id="map-container">
    <iframe id="map" frameborder="0" style="border:0" 
        src="https://www.google.com/maps/embed/v1/place?key=YOUR_API_KEY&q=Taichung+Park" allowfullscreen>
    </iframe>
    <div class="radar-overlay"></div>
</div>

<div class="query-panel">
    <div class="input-group">
        <input type="text" id="query-input" placeholder="輸入身分證 / 車牌 / 案件號" autocomplete="off">
        <button onclick="runQuery()">查詢</button>
    </div>
    <div id="result-display">系統待命...</div>
</div>

<script>
    // 計時器邏輯
    let seconds = 0;
    setInterval(() => {
        seconds++;
        let h = Math.floor(seconds / 3600).toString().padStart(2, '0');
        let m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
        let s = (seconds % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${h}:${m}:${s}`;
    }, 1000);

    // 模擬查詢邏輯 (白帽版)
    function runQuery() {
        const input = document.getElementById('query-input').value.trim().toUpperCase();
        const display = document.getElementById('result-display');
        
        if (!input) return;
        
        display.innerHTML = "正在連通資料庫... [SCANNING]";
        
        setTimeout(() => {
            if (input === "TEST-99") {
                display.innerHTML = `<span class="alert">⚠️ 警示：該目標為遺失車輛 (模擬測試)</span>`;
            } else {
                display.innerHTML = `查詢完成：目標 [${input}] 狀態正常。`;
            }
        }, 1500);
    }

    // 取得真實定位並更新 Iframe (簡易版)
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            // 這裡可以根據經緯度動態更新地圖網址
            console.log(`目前座標: ${latitude}, ${longitude}`);
        });
    }
</script>

</body>
</html>
