<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-Police 整合查詢系統</title>
    <style>
        :root {
            --police-blue: #1565C0;
            --bg-light: #F0F4F8;
            --input-border: #BDC3C7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg-light); color: #2C3E50; display: flex; justify-content: center; height: 100vh; }
        
        .container { width: 100%; max-width: 400px; padding: 30px 25px; display: flex; flex-direction: column; align-items: center; }

        /* 頂部 Logo 區 */
        .logo-area { text-align: center; margin-bottom: 40px; }
        .shield-icon { font-size: 60px; color: var(--police-blue); margin-bottom: 10px; }
        .sub-title { font-size: 14px; letter-spacing: 3px; color: #7F8C8D; font-weight: bold; }
        .main-title { font-size: 24px; font-weight: 900; color: #34495E; margin-top: 5px; }

        /* 輸入與選單區 */
        .form-group { width: 100%; margin-bottom: 18px; }
        label { display: block; font-size: 13px; color: var(--police-blue); font-weight: bold; margin-bottom: 5px; margin-left: 2px; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid var(--input-border); 
            border-radius: 6px; font-size: 16px; background: white; outline: none;
        }
        input:focus { border-color: var(--police-blue); box-shadow: 0 0 5px rgba(21, 101, 192, 0.2); }

        /* 按鈕區 */
        .btn-row { display: flex; width: 100%; gap: 10px; margin-top: 25px; }
        .btn { 
            flex: 2; padding: 14px; border: none; border-radius: 6px; 
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-login { background-color: var(--police-blue); color: white; }
        .btn-clear { flex: 1; background-color: #95A5A6; color: white; }
        .btn-sync { 
            width: 100%; margin-top: 15px; background: transparent; 
            border: 2px solid var(--police-blue); color: var(--police-blue); 
            padding: 10px; font-size: 15px; border-radius: 6px;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        /* 提示框 */
        #toast {
            position: fixed; bottom: 50px; background: rgba(0,0,0,0.7); 
            color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px;
            display: none; z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <div class="shield-icon">🛡️</div>
        <div class="sub-title">內政部警政署</div>
        <div class="main-title">M-Police 整合查詢</div>
    </div>

    <div class="form-group">
        <label>載具帳號 (ID)</label>
        <input type="text" id="user_id" placeholder="請輸入帳號">
    </div>

    <div class="form-group">
        <label>認證密碼 (PW)</label>
        <input type="password" id="user_pw" placeholder="請輸入密碼">
    </div>

    <div class="form-group">
        <label>勤務類別</label>
        <select id="patrol_type">
            <option>巡邏</option>
            <option>臨檢</option>
            <option>處事</option>
            <option>其他</option>
        </select>
    </div>

    <div class="form-group">
        <label>交通載具</label>
        <select id="vehicle_type">
            <option>汽車</option>
            <option>機車</option>
            <option>徒步</option>
        </select>
    </div>

    <div class="btn-row">
        <button class="btn btn-login" onclick="handleAction('驗證憑證中...')">登入系統</button>
        <button class="btn btn-clear" onclick="clearForm()">清除</button>
    </div>

    <button class="btn-sync" onclick="handleAction('正在同步通緝/失竊資料庫...')">🔄 離線資料同步 (Offline Sync)</button>
</div>

<div id="toast"></div>

<script>
    // 1. 自動讀取上次的設定 (Local Storage)
    window.onload = () => {
        if(localStorage.getItem('m_id')) document.getElementById('user_id').value = localStorage.getItem('m_id');
        if(localStorage.getItem('m_patrol')) document.getElementById('patrol_type').value = localStorage.getItem('m_patrol');
        if(localStorage.getItem('m_vehicle')) document.getElementById('vehicle_type').value = localStorage.getItem('m_vehicle');
    };

    // 2. 模擬操作與存檔
    function handleAction(msg) {
        // 儲存當前設定，下次不用重選
        localStorage.setItem('m_id', document.getElementById('user_id').value);
        localStorage.setItem('m_patrol', document.getElementById('patrol_type').value);
        localStorage.setItem('m_vehicle', document.getElementById('vehicle_type').value);
        
        showToast(msg);
        
        // 模擬跳轉 (如果是要做整套，這裡可以跳轉到你的地圖頁面)
        if(msg.includes('驗證')) {
            setTimeout(() => showToast("身份驗證成功，系統已就緒"), 1500);
        }
    }

    function clearForm() {
        document.getElementById('user_id').value = "";
        document.getElementById('user_pw').value = "";
        showToast("欄位已清除");
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }
</script>

</body>
</html>
