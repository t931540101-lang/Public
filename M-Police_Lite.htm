<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-Police Tactical V2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --tactical-green: #00ff41;
            --warning-red: #ff3e3e;
            --ar-blue: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Share Tech Mono', monospace; }
        body { background: #000; color: var(--tactical-green); overflow: hidden; height: 100vh; }

        /* 相機背景 */
        #video-preview {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; filter: brightness(0.8) contrast(1.2);
        }

        /* 戰術抬頭顯示器 (HUD) */
        .hud-overlay {
            position: fixed; inset: 0; z-index: 10;
            pointer-events: none; border: 20px solid rgba(0, 255, 65, 0.05);
        }

        /* 掃描線動畫 */
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: linear-gradient(to bottom, transparent, var(--tactical-green), transparent);
            opacity: 0.5; animation: scan 3s linear infinite;
        }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }

        /* 人臉追蹤框 (模擬 AI 鎖定) */
        .target-box {
            position: absolute; top: 35%; left: 25%; width: 50%; height: 30%;
            border: 2px solid var(--tactical-green);
            box-shadow: 0 0 15px var(--tactical-green);
            transition: all 0.1s ease;
        }
        .target-box::before, .target-box::after {
            content: ""; position: absolute; width: 20px; height: 20px; border: 2px solid #fff;
        }
        .target-box::before { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .target-box::after { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        /* 鎖定框旁的數據 */
        .target-data {
            position: absolute; right: -120px; top: 0;
            font-size: 10px; line-height: 1.2; background: rgba(0,0,0,0.5); padding: 5px;
        }

        /* 頂部與底部面板 */
        .panel {
            position: fixed; width: 100%; z-index: 20; background: rgba(0,0,0,0.7);
            padding: 10px 15px; border: 1px solid var(--tactical-green);
            backdrop-filter: blur(5px); pointer-events: auto;
        }
        .top-panel { top: 0; display: flex; justify-content: space-between; }
        .bottom-panel { bottom: 0; }

        .btn {
            background: var(--tactical-green); color: #000; border: none;
            padding: 8px 15px; font-weight: bold; font-size: 12px; cursor: pointer;
        }
        
        #log-window { font-size: 10px; height: 40px; overflow: hidden; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<video id="video-preview" autoplay playsinline></video>

<div class="hud-overlay">
    <div class="scan-line"></div>
    
    <div class="target-box" id="tracker">
        <div class="target-data">
            ID: UNKNOWN<br>
            MATCH: <span id="match-pc">0.0</span>%<br>
            TEMP: 36.5C<br>
            STATE: SCANNING
        </div>
    </div>
</div>

<div class="panel top-panel">
    <div>MODE: [AR-VISION]</div>
    <div id="clock">00:00:00</div>
</div>

<div class="panel bottom-panel">
    <div style="display: flex; gap: 10px;">
        <button class="btn" onclick="toggleCamera()">SWITCH CAM</button>
        <button class="btn" onclick="captureTarget()" style="background: var(--warning-red); color: #fff;">LOCK TARGET</button>
    </div>
    <div id="log-window">> SYSTEM INITIALIZING...</div>
</div>

<script>
    const video = document.getElementById('video-preview');
    const log = document.getElementById('log-window');
    const matchPc = document.getElementById('match-pc');

    // 1. 啟動相機
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
            addLog("CAMERA LINK ESTABLISHED.");
        } catch (err) {
            addLog("ERROR: CAMERA ACCESS DENIED.");
        }
    }

    // 2. 模擬日誌跳動
    function addLog(msg) {
        log.innerHTML = "> " + msg + "<br>" + log.innerHTML;
    }

    // 3. 模擬 AI 數據變化
    setInterval(() => {
        if(Math.random() > 0.5) {
            let val = (Math.random() * 30 + 60).toFixed(1);
            matchPc.innerText = val;
            // 讓追蹤框輕微抖動，增加真實感
            const tracker = document.getElementById('tracker');
            tracker.style.transform = `translate(${Math.random()*4-2}px, ${Math.random()*4-2}px)`;
        }
    }, 500);

    function captureTarget() {
        addLog("TARGET LOCKED. ANALYZING BIOMETRICS...");
        setTimeout(() => {
            addLog("MATCH FOUND: CITIZEN_DB_SCAN_COMPLETED.");
        }, 1500);
    }

    function toggleCamera() {
        addLog("RELAYING SIGNAL... SWITCHING SENSORS.");
    }

    // 初始化
    initCamera();
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
