<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-Police 整合查詢系統 V1.5</title>
    <style>
        :root { --police-blue: #1565C0; --bg-light: #F0F4F8; --card-bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg-light); color: #2C3E50; }
        #login-page, #main-page { padding: 25px; height: 100vh; }
        .btn-main { width: 100%; padding: 16px; background: var(--police-blue); color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; }
        .result-box { margin-top: 20px; padding: 15px; background: #E3F2FD; border-radius: 8px; border: 1px dashed var(--police-blue); min-height: 150px; }
        input { width: 100%; padding: 14px; border: 2px solid #D7DBDD; border-radius: 8px; margin-bottom: 10px; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="login-page">
    <h2 style="text-align:center">🛡️ M-Police 雲端登入</h2>
    <input type="text" id="login_id" placeholder="請輸入警員編號">
    <button class="btn-main" onclick="login()">登入系統</button>
</div>

<div id="main-page" style="display:none">
    <h3>🔍 雲端整合查詢</h3>
    <input type="text" id="query_input" placeholder="輸入工號 (例如: S007)">
    <button class="btn-main" onclick="doQuery()">立即查詢</button>
    <div class="result-box" id="query_res">等待指令...</div>
</div>

<script>
    // ⚠️ 小黑哥，這裡請換成你電腦目前的 IPv4 IP
    const SERVER_IP = '192.168.1.XX'; 
    const API_URL = `http://${SERVER_IP}:3000/api/query`;

    function login() {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-page').style.display = 'block';
    }

    async function doQuery() {
        const target = document.getElementById('query_input').value;
        const resBox = document.getElementById('query_res');
        if(!target) return;
        resBox.innerHTML = "📡 連線東京雲端中...";
        try {
            const response = await fetch(`${API_URL}?id=${target}`);
            const data = await response.json();
            if (data.success) {
                const p = data.data;
                resBox.innerHTML = `<b>查詢結果：${p.name}</b><br>部門：${p.department}<br>車牌：${p.plate}<br>備註：${p.note}`;
            } else {
                resBox.innerHTML = "<b style='color:red'>查無此人</b>";
            }
        } catch (e) {
            resBox.innerHTML = "<b style='color:red'>連線失敗</b><br>請確認電腦 Server 是否開啟";
        }
    }
</script>
</body>
</html>
