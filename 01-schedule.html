<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>排班系統</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="排班系統">
<meta name="theme-color" content="#1a1f2e">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --primary: #1a1f2e;
  --accent: #3b82f6;

/* 班別顏色 */
–day-b:   #f59e0b;   /* 日B班 - 琥珀 */
–night-e: #8b5cf6;   /* 夜E班 - 紫 */
–night-b: #06b6d4;   /* 夜B班 - 青 */
–off:     #10b981;   /* 休假 - 綠 */
–annual:  #f43f5e;   /* 特休 - 玫紅 */
–holiday: #ec4899;   /* 節日 - 粉 */
–leave:   #6b7280;   /* 請假 - 灰 */
–regular: #94a3b8;   /* 例假 - 淺灰藍 */
–empty:   #e2e8f0;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
font-family: ‘Noto Sans TC’, sans-serif;
background: var(–bg);
min-height: 100vh;
color: var(–primary);
}

/* ── Header ── */
.header {
background: var(–primary);
color: #fff;
padding: 14px 16px;
padding-top: calc(14px + env(safe-area-inset-top));
position: sticky; top: 0; z-index: 100;
box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.header-title { font-size:18px; font-weight:900; letter-spacing:1px; }
.header-actions { display:flex; gap:8px; }
.h-btn {
background: rgba(255,255,255,0.12); border:none; color:#fff;
padding:6px 12px; border-radius:8px; font-size:12px; font-weight:700;
cursor:pointer; font-family:inherit; transition:background .15s;
}
.h-btn:active { background:rgba(255,255,255,0.25); }
.h-btn.accent { background:var(–accent); }

.month-nav { display:flex; align-items:center; justify-content:space-between; }
.nav-btn {
background:rgba(255,255,255,0.12); border:none; color:#fff;
width:32px; height:32px; border-radius:8px; font-size:18px;
cursor:pointer; display:flex; align-items:center; justify-content:center;
transition:background .15s;
}
.nav-btn:active { background:rgba(255,255,255,0.25); }
.month-label { font-size:16px; font-weight:700; }

/* ── 員工選擇 ── */
.staff-bar {
background:#fff; padding:10px 12px;
display:flex; gap:6px; overflow-x:auto;
border-bottom:2px solid var(–bg);
-webkit-overflow-scrolling:touch;
}
.staff-bar::-webkit-scrollbar { display:none; }
.staff-chip {
flex-shrink:0; padding:6px 14px; border-radius:20px;
font-size:13px; font-weight:700; cursor:pointer;
border:2px solid transparent; transition:all .15s;
background:var(–bg); color:#666;
}
.staff-chip.active { background:var(–primary); color:#fff; border-color:var(–primary); }

/* ── 週標題 ── */
.weekdays {
display:grid; grid-template-columns:repeat(7,1fr);
background:#fff; border-bottom:1px solid var(–bg);
padding:0 4px;
}
.wd {
text-align:center; padding:6px 0;
font-size:11px; font-weight:700; color:#999;
}
.wd.sun { color:#ef4444; }
.wd.sat { color:#3b82f6; }

/* ── 月曆 ── */
.calendar {
display:grid; grid-template-columns:repeat(7,1fr);
gap:2px; padding:4px;
}

.day-cell {
background:var(–card); border-radius:8px;
min-height:68px; padding:4px;
display:flex; flex-direction:column; gap:2px;
cursor:pointer; transition:box-shadow .15s;
position:relative; overflow:hidden;
}
.day-cell:active { box-shadow:0 0 0 2px var(–accent); }
.day-cell.empty { background:transparent; cursor:default; }
.day-cell.today { box-shadow:0 0 0 2px var(–accent); }

.day-num {
font-size:12px; font-weight:700; text-align:center;
line-height:1.2;
}
.day-cell.sun .day-num { color:#ef4444; }
.day-cell.sat .day-num { color:#3b82f6; }
.day-cell.other-month .day-num { color:#ccc; }

.shift-badge {
width:100%; border-radius:4px; padding:2px 0;
font-size:9px; font-weight:700; text-align:center;
color:#fff; line-height:1.3;
}

/* 班別顏色 */
.s-dayb   { background:var(–day-b); }
.s-nighte { background:var(–night-e); }
.s-nightb { background:var(–night-b); }
.s-off    { background:var(–off); }
.s-annual { background:var(–annual); }
.s-holiday{ background:var(–holiday); }
.s-leave  { background:var(–leave); }
.s-regular{ background:var(–regular); }

/* ── 選班 Modal ── */
.overlay {
position:fixed; inset:0; background:rgba(0,0,0,0.5);
display:none; align-items:flex-end; justify-content:center;
z-index:200; backdrop-filter:blur(3px);
}
.overlay.open { display:flex; }
.shift-modal {
background:#fff; width:100%; border-radius:24px 24px 0 0;
padding:20px 16px;
padding-bottom: calc(20px + env(safe-area-inset-bottom));
animation: slideUp .25s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.modal-handle { width:40px; height:4px; background:#e2e8f0; border-radius:2px; margin:0 auto 16px; }
.modal-date { font-size:15px; font-weight:700; text-align:center; margin-bottom:14px; color:#666; }

.shift-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.shift-option {
padding:12px 8px; border-radius:12px; border:2px solid transparent;
cursor:pointer; text-align:center; transition:all .15s;
font-family:inherit;
}
.shift-option:active { transform:scale(.96); }
.shift-option .s-icon { font-size:20px; display:block; margin-bottom:4px; }
.shift-option .s-name { font-size:13px; font-weight:700; }
.shift-option .s-time { font-size:10px; opacity:.75; }

.so-dayb   { background:#fef3c7; border-color:var(–day-b);   color:#92400e; }
.so-nighte { background:#ede9fe; border-color:var(–night-e); color:#5b21b6; }
.so-nightb { background:#cffafe; border-color:var(–night-b); color:#155e75; }
.so-off    { background:#d1fae5; border-color:var(–off);     color:#065f46; }
.so-annual { background:#ffe4e6; border-color:var(–annual);  color:#9f1239; }
.so-holiday{ background:#fce7f3; border-color:var(–holiday); color:#9d174d; }
.so-leave  { background:#f3f4f6; border-color:var(–leave);   color:#374151; }
.so-regular{ background:#f1f5f9; border-color:var(–regular); color:#475569; }

.shift-option.selected { box-shadow:0 0 0 3px rgba(59,130,246,0.5); }

.modal-actions { display:flex; gap:8px; margin-top:14px; }
.modal-btn {
flex:1; padding:13px; border-radius:12px; border:none;
font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
}
.btn-clear { background:#f3f4f6; color:#666; }
.btn-save  { background:var(–primary); color:#fff; }
.btn-clear:active { background:#e5e7eb; }
.btn-save:active  { opacity:.8; }

/* ── 統計頁 ── */
.stats-overlay {
position:fixed; inset:0; background:#f0f4f8;
display:none; flex-direction:column;
z-index:300;
}
.stats-overlay.open { display:flex; }
.stats-header {
background:var(–primary); color:#fff;
padding:14px 16px;
padding-top:calc(14px + env(safe-area-inset-top));
display:flex; align-items:center; gap:12px;
}
.stats-back { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; }
.stats-title { font-size:17px; font-weight:700; }
.stats-body { flex:1; overflow-y:auto; padding:16px; }

.stats-person { background:#fff; border-radius:12px; padding:16px; margin-bottom:14px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.sp-name { font-size:15px; font-weight:700; margin-bottom:12px; color:var(–primary); }
.sp-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.sp-item { border-radius:8px; padding:10px; text-align:center; }
.sp-count { font-size:22px; font-weight:900; }
.sp-label { font-size:11px; margin-top:2px; opacity:.8; }

/* ── 圖例 ── */
.legend {
background:#fff; padding:10px 14px;
display:flex; flex-wrap:wrap; gap:6px;
border-top:1px solid var(–bg);
}
.legend-item { display:flex; align-items:center; gap:4px; font-size:11px; }
.legend-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

/* print */
@media print {
.header, .staff-bar, .legend, .overlay, .stats-overlay { display:none !important; }
body { background:#fff; }
.calendar { gap:1px; }
.day-cell { min-height:60px; }
}
</style>

</head>
<body>

<!-- Header -->

<div class="header">
  <div class="header-top">
    <div class="header-title">📅 排班系統</div>
    <div class="header-actions">
      <button class="h-btn" onclick="openStats()">📊 統計</button>
      <button class="h-btn" onclick="window.print()">🖨️ 列印</button>
    </div>
  </div>
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>
</div>

<!-- 員工列 -->

<div class="staff-bar" id="staffBar"></div>

<!-- 週標題 -->

<div class="weekdays">
  <div class="wd sun">日</div>
  <div class="wd">一</div>
  <div class="wd">二</div>
  <div class="wd">三</div>
  <div class="wd">四</div>
  <div class="wd">五</div>
  <div class="wd sat">六</div>
</div>

<!-- 月曆 -->

<div class="calendar" id="calendar"></div>

<!-- 圖例 -->

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--day-b)"></div>日B班</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--night-e)"></div>夜E班</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--night-b)"></div>夜B班</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--off)"></div>休假</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--annual)"></div>特休</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--holiday)"></div>節日</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--leave)"></div>請假</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--regular)"></div>例假</div>
</div>

<!-- 選班 Modal -->

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="shift-modal">
    <div class="modal-handle"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="shift-grid">
      <button class="shift-option so-dayb"   onclick="selectShift('dayb')"   id="opt-dayb">
        <span class="s-icon">☀️</span>
        <span class="s-name">日B班</span>
        <span class="s-time">07:00–15:00</span>
      </button>
      <button class="shift-option so-nighte" onclick="selectShift('nighte')" id="opt-nighte">
        <span class="s-icon">🌆</span>
        <span class="s-name">夜E班</span>
        <span class="s-time">15:00–23:00</span>
      </button>
      <button class="shift-option so-nightb" onclick="selectShift('nightb')" id="opt-nightb">
        <span class="s-icon">🌙</span>
        <span class="s-name">夜B班</span>
        <span class="s-time">23:00–07:00</span>
      </button>
      <button class="shift-option so-off"    onclick="selectShift('off')"    id="opt-off">
        <span class="s-icon">🏖️</span>
        <span class="s-name">休假</span>
        <span class="s-time">例行休假</span>
      </button>
      <button class="shift-option so-annual" onclick="selectShift('annual')" id="opt-annual">
        <span class="s-icon">🌴</span>
        <span class="s-name">特休</span>
        <span class="s-time">年假特休</span>
      </button>
      <button class="shift-option so-holiday" onclick="selectShift('holiday')" id="opt-holiday">
        <span class="s-icon">🎉</span>
        <span class="s-name">節日</span>
        <span class="s-time">國定節日</span>
      </button>
      <button class="shift-option so-leave"  onclick="selectShift('leave')"  id="opt-leave">
        <span class="s-icon">🤒</span>
        <span class="s-name">請假</span>
        <span class="s-time">事/病假</span>
      </button>
      <button class="shift-option so-regular" onclick="selectShift('regular')" id="opt-regular">
        <span class="s-icon">📅</span>
        <span class="s-name">例假</span>
        <span class="s-time">固定例假</span>
      </button>
    </div>
    <div class="modal-actions">
      <button class="modal-btn btn-clear" onclick="clearShift()">清除</button>
      <button class="modal-btn btn-save"  onclick="saveShift()">確認</button>
    </div>
  </div>
</div>

<!-- 統計頁 -->

<div class="stats-overlay" id="statsOverlay">
  <div class="stats-header">
    <button class="stats-back" onclick="closeStats()">‹</button>
    <div class="stats-title" id="statsTitle">班次統計</div>
  </div>
  <div class="stats-body" id="statsBody"></div>
</div>

<script>
// ══════════════════════
//  資料設定
// ══════════════════════
const STAFF = ['小明','小華','小玲','小強','小美'];

const SHIFTS = {
  dayb:    { name:'日B班', cls:'s-dayb',    color:'#f59e0b' },
  nighte:  { name:'夜E班', cls:'s-nighte',  color:'#8b5cf6' },
  nightb:  { name:'夜B班', cls:'s-nightb',  color:'#06b6d4' },
  off:     { name:'休假',  cls:'s-off',     color:'#10b981' },
  annual:  { name:'特休',  cls:'s-annual',  color:'#f43f5e' },
  holiday: { name:'節日',  cls:'s-holiday', color:'#ec4899' },
  leave:   { name:'請假',  cls:'s-leave',   color:'#6b7280' },
  regular: { name:'例假',  cls:'s-regular', color:'#94a3b8' },
};

// localStorage 資料格式: schedule[year-month][staffName][date] = shiftKey
function loadData() {
  try { return JSON.parse(localStorage.getItem('schedule') || '{}'); } catch { return {}; }
}
function saveData(d) { localStorage.setItem('schedule', JSON.stringify(d)); }

let data = loadData();
let currentYear, currentMonth;
let currentStaff = STAFF[0];
let selectedDate = null;
let tempShift = null;

const today = new Date();

// ══════════════════════
//  初始化
// ══════════════════════
window.onload = () => {
  currentYear  = today.getFullYear();
  currentMonth = today.getMonth();
  renderStaffBar();
  renderCalendar();
};

// ══════════════════════
//  員工列
// ══════════════════════
function renderStaffBar() {
  const bar = document.getElementById('staffBar');
  bar.innerHTML = '';
  STAFF.forEach(name => {
    const chip = document.createElement('button');
    chip.className = 'staff-chip' + (name === currentStaff ? ' active' : '');
    chip.textContent = name;
    chip.onclick = () => { currentStaff = name; renderStaffBar(); renderCalendar(); };
    bar.appendChild(chip);
  });
}

// ══════════════════════
//  月曆
// ══════════════════════
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function renderCalendar() {
  const label = document.getElementById('monthLabel');
  label.textContent = `${currentYear} 年 ${currentMonth + 1} 月`;

  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const monthKey = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const monthData = (data[monthKey] || {})[currentStaff] || {};

  // 空格
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'day-cell empty';
    cal.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(currentYear, currentMonth, d);
    const dow = date.getDay();
    const dateStr = `${monthKey}-${String(d).padStart(2,'0')}`;
    const isToday = (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear());

    const cell = document.createElement('div');
    let cls = 'day-cell';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (isToday)  cls += ' today';
    cell.className = cls;
    cell.onclick = () => openModal(dateStr, d);

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    cell.appendChild(num);

    const shift = monthData[dateStr];
    if (shift && SHIFTS[shift]) {
      const badge = document.createElement('div');
      badge.className = `shift-badge ${SHIFTS[shift].cls}`;
      badge.textContent = SHIFTS[shift].name;
      cell.appendChild(badge);
    }

    cal.appendChild(cell);
  }
}

// ══════════════════════
//  選班 Modal
// ══════════════════════
function openModal(dateStr, d) {
  selectedDate = dateStr;
  const monthKey = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const monthData = (data[monthKey] || {})[currentStaff] || {};
  tempShift = monthData[dateStr] || null;

  const dow = ['日','一','二','三','四','五','六'][new Date(currentYear, currentMonth, d).getDay()];
  document.getElementById('modalDate').textContent =
    `${currentStaff}　${currentYear}/${currentMonth+1}/${d}（${dow}）`;

  // 清除選中狀態
  Object.keys(SHIFTS).forEach(k => {
    document.getElementById('opt-' + k).classList.toggle('selected', k === tempShift);
  });

  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
    tempShift = null;
  }
}

function selectShift(key) {
  tempShift = (tempShift === key) ? null : key;
  Object.keys(SHIFTS).forEach(k => {
    document.getElementById('opt-' + k).classList.toggle('selected', k === tempShift);
  });
}

function saveShift() {
  if (!selectedDate) return;
  const monthKey = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  if (!data[monthKey]) data[monthKey] = {};
  if (!data[monthKey][currentStaff]) data[monthKey][currentStaff] = {};

  if (tempShift) {
    data[monthKey][currentStaff][selectedDate] = tempShift;
  } else {
    delete data[monthKey][currentStaff][selectedDate];
  }

  saveData(data);
  document.getElementById('overlay').classList.remove('open');
  tempShift = null;
  renderCalendar();
}

function clearShift() {
  tempShift = null;
  Object.keys(SHIFTS).forEach(k => {
    document.getElementById('opt-' + k).classList.remove('selected');
  });
}

// ══════════════════════
//  統計
// ══════════════════════
function openStats() {
  document.getElementById('statsTitle').textContent =
    `${currentYear} 年 ${currentMonth+1} 月 統計`;

  const monthKey = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const body = document.getElementById('statsBody');
  body.innerHTML = '';

  STAFF.forEach(name => {
    const staffData = (data[monthKey] || {})[name] || {};
    const counts = {};
    Object.keys(SHIFTS).forEach(k => counts[k] = 0);
    Object.values(staffData).forEach(s => { if (counts[s] !== undefined) counts[s]++; });

    const card = document.createElement('div');
    card.className = 'stats-person';

    const nameEl = document.createElement('div');
    nameEl.className = 'sp-name';
    nameEl.textContent = `👤 ${name}`;
    card.appendChild(nameEl);

    const grid = document.createElement('div');
    grid.className = 'sp-grid';

    Object.entries(SHIFTS).forEach(([key, shift]) => {
      const item = document.createElement('div');
      item.className = 'sp-item';
      item.style.background = shift.color + '20';
      item.style.border = `1.5px solid ${shift.color}40`;

      const count = document.createElement('div');
      count.className = 'sp-count';
      count.style.color = shift.color;
      count.textContent = counts[key];

      const lbl = document.createElement('div');
      lbl.className = 'sp-label';
      lbl.style.color = shift.color;
      lbl.textContent = shift.name;

      item.appendChild(count);
      item.appendChild(lbl);
      grid.appendChild(item);
    });

    card.appendChild(grid);
    body.appendChild(card);
  });

  document.getElementById('statsOverlay').classList.add('open');
}

function closeStats() {
  document.getElementById('statsOverlay').classList.remove('open');
}
</script>

</body>
</html><!DOCTYPE html>

  --card: #ffffff;
  --primary: #1a1f2e;
  --accent: #3b82f6;

/* 班別顏色 */
–day-b:   #f59e0b;   /* 日B班 - 琥珀 */
–night-e: #8b5cf6;   /* 夜E班 - 紫 */
–night-b: #06b6d4;   /* 夜B班 - 青 */
–off:     #10b981;   /* 休假 - 綠 */
–annual:  #f43f5e;   /* 特休 - 玫紅 */
–holiday: #ec4899;   /* 節日 - 粉 */
–leave:   #6b7280;   /* 請假 - 灰 */
–regular: #94a3b8;   /* 例假 - 淺灰藍 */
–empty:   #e2e8f0;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
font-family: ‘Noto Sans TC’, sans-serif;
background: var(–bg);
min-height: 100vh;
color: var(–primary);
}

/* ── Header ── */
.header {
background: var(–primary);
color: #fff;
padding: 14px 16px;
padding-top: calc(14px + env(safe-area-inset-top));
position: sticky; top: 0; z-index: 100;
box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.header-title { font-size:18px; font-weight:900; letter-spacing:1px; }
.header-actions { display:flex; gap:8px; }
.h-btn {
background: rgba(255,255,255,0.12); border:none; color:#fff;
padding:6px 12px; border-radius:8px; font-size:12px; font-weight:700;
cursor:pointer; font-family:inherit; transition:background .15s;
}
.h-btn:active { background:rgba(255,255,255,0.25); }
.h-btn.accent { background:var(–accent); }

.month-nav { display:flex; align-items:center; justify-content:space-between; }
.nav-btn {
background:rgba(255,255,255,0.12); border:none; color:#fff;
width:32px; height:32px; border-radius:8px; font-size:18px;
cursor:pointer; display:flex; align-items:center; justify-content:center;
transition:background .15s;
}
.nav-btn:active { background:rgba(255,255,255,0.25); }
.month-label { font-size:16px; font-weight:700; }

/* ── 員工選擇 ── */
.staff-bar {
background:#fff; padding:10px 12px;
display:flex; gap:6px; overflow-x:auto;
border-bottom:2px solid var(–bg);
-webkit-overflow-scrolling:touch;
}
.staff-bar::-webkit-scrollbar { display:none; }
.staff-chip {
flex-shrink:0; padding:6px 14px; border-radius:20px;
font-size:13px; font-weight:700; cursor:pointer;
border:2px solid transparent; transition:all .15s;
background:var(–bg); color:#666;
}
.staff-chip.active { background:var(–primary); color:#fff; border-color:var(–primary); }

/* ── 週標題 ── */
.weekdays {
display:grid; grid-template-columns:repeat(7,1fr);
background:#fff; border-bottom:1px solid var(–bg);
padding:0 4px;
}
.wd {
text-align:center; padding:6px 0;
font-size:11px; font-weight:700; color:#999;
}
.wd.sun { color:#ef4444; }
.wd.sat { color:#3b82f6; }

/* ── 月曆 ── */
.calendar {
display:grid; grid-template-columns:repeat(7,1fr);
gap:2px; padding:4px;
}

.day-cell {
background:var(–card); border-radius:8px;
min-height:68px; padding:4px;
display:flex; flex-direction:column; gap:2px;
cursor:pointer; transition:box-shadow .15s;
position:relative; overflow:hidden;
}
.day-cell:active { box-shadow:0 0 0 2px var(–accent); }
.day-cell.empty { background:transparent; cursor:default; }
.day-cell.today { box-shadow:0 0 0 2px var(–accent); }

.day-num {
font-size:12px; font-weight:700; text-align:center;
line-height:1.2;
}
.day-cell.sun .day-num { color:#ef4444; }
.day-cell.sat .day-num { color:#3b82f6; }
.day-cell.other-month .day-num { color:#ccc; }

.shift-badge {
width:100%; border-radius:4px; padding:2px 0;
font-size:9px; font-weight:700; text-align:center;
color:#fff; line-height:1.3;
}

/* 班別顏色 */
.s-dayb   { background:var(–day-b); }
.s-nighte { background:var(–night-e); }
.s-nightb { background:var(–night-b); }
.s-off    { background:var(–off); }
.s-annual { background:var(–annual); }
.s-holiday{ background:var(–holiday); }
.s-leave  { background:var(–leave); }
.s-regular{ background:var(–regular); }

/* ── 選班 Modal ── */
.overlay {
position:fixed; inset:0; background:rgba(0,0,0,0.5);
display:none; align-items:flex-end; justify-content:center;
z-index:200; backdrop-filter:blur(3px);
}
.overlay.open { display:flex; }
.shift-modal {
background:#fff; width:100%; border-radius:24px 24px 0 0;
padding:20px 16px;
padding-bottom: calc(20px + env(safe-area-inset-bottom));
animation: slideUp .25s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.modal-handle { width:40px; height:4px; background:#e2e8f0; border-radius:2px; margin:0 auto 16px; }
.modal-date { font-size:15px; font-weight:700; text-align:center; margin-bottom:14px; color:#666; }

.shift-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.shift-option {
padding:12px 8px; border-radius:12px; border:2px solid transparent;
cursor:pointer; text-align:center; transition:all .15s;
font-family:inherit;
}
.shift-option:active { transform:scale(.96); }
.shift-option .s-icon { font-size:20px; display:block; margin-bottom:4px; }
.shift-option .s-name { font-size:13px; font-weight:700; }
.shift-option .s-time { font-size:10px; opacity:.75; }

.so-dayb   { background:#fef3c7; border-color:var(–day-b);   color:#92400e; }
.so-nighte { background:#ede9fe; border-color:var(–night-e); color:#5b21b6; }
.so-nightb { background:#cffafe; border-color:var(–night-b); color:#155e75; }
.so-off    { background:#d1fae5; border-color:var(–off);     color:#065f46; }
.so-annual { background:#ffe4e6; border-color:var(–annual);  color:#9f1239; }
.so-holiday{ background:#fce7f3; border-color:var(–holiday); color:#9d174d; }
.so-leave  { background:#f3f4f6; border-color:var(–leave);   color:#374151; }
.so-regular{ background:#f1f5f9; border-color:var(–regular); color:#475569; }

.shift-option.selected { box-shadow:0 0 0 3px rgba(59,130,246,0.5); }

.modal-actions { display:flex; gap:8px; margin-top:14px; }
.modal-btn {
flex:1; padding:13px; border-radius:12px; border:none;
font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
}
.btn-clear { background:#f3f4f6; color:#666; }
.btn-save  { background:var(–primary); color:#fff; }
.btn-clear:active { background:#e5e7eb; }
.btn-save:active  { opacity:.8; }

/* ── 統計頁 ── */
.stats-overlay {
position:fixed; inset:0; background:#f0f4f8;
display:none; flex-direction:column;
z-index:300;
}
.stats-overlay.open { display:flex; }
.stats-header {
background:var(–primary); color:#fff;
padding:14px 16px;
padding-top:calc(14px + env(safe-area-inset-top));
display:flex; align-items:center; gap:12px;
}
.stats-back { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; }
.stats-title { font-size:17px; font-weight:700; }
.stats-body { flex:1; overflow-y:auto; padding:16px; }

.stats-person { background:#fff; border-radius:12px; padding:16px; margin-bottom:14px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.sp-name { font-size:15px; font-weight:700; margin-bottom:12px; color:var(–primary); }
.sp-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.sp-item { border-radius:8px; padding:10px; text-align:center; }
.sp-count { font-size:22px; font-weight:900; }
.sp-label { font-size:11px; margin-top:2px; opacity:.8; }

/* ── 圖例 ── */
.legend {
background:#fff; padding:10px 14px;
display:flex; flex-wrap:wrap; gap:6px;
border-top:1px solid var(–bg);
}
.legend-item { display:flex; align-items:center; gap:4px; font-size:11px; }
.legend-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

/* print */
@media print {
.header, .staff-bar, .legend, .overlay, .stats-overlay { display:none !important; }
body { background:#fff; }
.calendar { gap:1px; }
.day-cell { min-height:60px; }
}
</style>

</head>
<body>

<!-- Header -->

<div class="header">
  <div class="header-top">
    <div class="header-title">📅 排班系統</div>
    <div class="header-actions">
      <button class="h-btn" onclick="openStats()">📊 統計</button>
      <button class="h-btn" onclick="window.print()">🖨️ 列印</button>
    </div>
  </div>
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>
</div>

<!-- 員工列 -->

<div class="staff-bar" id="staffBar"></div>

<!-- 週標題 -->

<div class="weekdays">
  <div class="wd sun">日</div>
  <div class="wd">一</div>
  <div class="wd">二</div>
  <div class="wd">三</div>
  <div class="wd">四</div>
  <div class="wd">五</div>
  <div class="wd sat">六</div>
</div>

<!-- 月曆 -->

<div class="calendar" id="calendar"></div>

<!-- 圖例 -->

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--day-b)"></div>日B班</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--night-e)"></div>夜E班</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--night-b)"></div>夜B班</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--off)"></div>休假</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--annual)"></div>特休</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--holiday)"></div>節日</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--leave)"></div>請假</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--regular)"></div>例假</div>
</div>

<!-- 選班 Modal -->

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="shift-modal">
    <div class="modal-handle"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="shift-grid">
      <button class="shift-option so-dayb"   onclick="selectShift('dayb')"   id="opt-dayb">
        <span class="s-icon">☀️</span>
        <span class="s-name">日B班</span>
        <span class="s-time">07:00–15:00</span>
      </button>
      <button class="shift-option so-nighte" onclick="selectShift('nighte')" id="opt-nighte">
        <span class="s-icon">🌆</span>
        <span class="s-name">夜E班</span>
        <span class="s-time">15:00–23:00</span>
      </button>
      <button class="shift-option so-nightb" onclick="selectShift('nightb')" id="opt-nightb">
        <span class="s-icon">🌙</span>
        <span class="s-name">夜B班</span>
        <span class="s-time">23:00–07:00</span>
      </button>
      <button class="shift-option so-off"    onclick="selectShift('off')"    id="opt-off">
        <span class="s-icon">🏖️</span>
        <span class="s-name">休假</span>
        <span class="s-time">例行休假</span>
      </button>
      <button class="shift-option so-annual" onclick="selectShift('annual')" id="opt-annual">
        <span class="s-icon">🌴</span>
        <span class="s-name">特休</span>
        <span class="s-time">年假特休</span>
      </button>
      <button class="shift-option so-holiday" onclick="selectShift('holiday')" id="opt-holiday">
        <span class="s-icon">🎉</span>
        <span class="s-name">節日</span>
        <span class="s-time">國定節日</span>
      </button>
      <button class="shift-option so-leave"  onclick="selectShift('leave')"  id="opt-leave">
        <span class="s-icon">🤒</span>
        <span class="s-name">請假</span>
        <span class="s-time">事/病假</span>
      </button>
      <button class="shift-option so-regular" onclick="selectShift('regular')" id="opt-regular">
        <span class="s-icon">📅</span>
        <span class="s-name">例假</span>
        <span class="s-time">固定例假</span>
      </button>
    </div>
    <div class="modal-actions">
      <button class="modal-btn btn-clear" onclick="clearShift()">清除</button>
      <button class="modal-btn btn-save"  onclick="saveShift()">確認</button>
    </div>
  </div>
</div>

<!-- 統計頁 -->

<div class="stats-overlay" id="statsOverlay">
  <div class="stats-header">
    <button class="stats-back" onclick="closeStats()">‹</button>
    <div class="stats-title" id="statsTitle">班次統計</div>
  </div>
  <div class="stats-body" id="statsBody"></div>
</div>

<script>
// ══════════════════════
//  資料設定
// ══════════════════════
const STAFF = ['小明','小華','小玲','小強','小美'];

const SHIFTS = {
  dayb:    { name:'日B班', cls:'s-dayb',    color:'#f59e0b' },
  nighte:  { name:'夜E班', cls:'s-nighte',  color:'#8b5cf6' },
  nightb:  { name:'夜B班', cls:'s-nightb',  color:'#06b6d4' },
  off:     { name:'休假',  cls:'s-off',     color:'#10b981' },
  annual:  { name:'特休',  cls:'s-annual',  color:'#f43f5e' },
  holiday: { name:'節日',  cls:'s-holiday', color:'#ec4899' },
  leave:   { name:'請假',  cls:'s-leave',   color:'#6b7280' },
  regular: { name:'例假',  cls:'s-regular', color:'#94a3b8' },
};

// localStorage 資料格式: schedule[year-month][staffName][date] = shiftKey
function loadData() {
  try { return JSON.parse(localStorage.getItem('schedule') || '{}'); } catch { return {}; }
}
function saveData(d) { localStorage.setItem('schedule', JSON.stringify(d)); }

let data = loadData();
let currentYear, currentMonth;
let currentStaff = STAFF[0];
let selectedDate = null;
let tempShift = null;

const today = new Date();

// ══════════════════════
//  初始化
// ══════════════════════
window.onload = () => {
  currentYear  = today.getFullYear();
  currentMonth = today.getMonth();
  renderStaffBar();
  renderCalendar();
};

// ══════════════════════
//  員工列
// ══════════════════════
function renderStaffBar() {
  const bar = document.getElementById('staffBar');
  bar.innerHTML = '';
  STAFF.forEach(name => {
    const chip = document.createElement('button');
    chip.className = 'staff-chip' + (name === currentStaff ? ' active' : '');
    chip.textContent = name;
    chip.onclick = () => { currentStaff = name; renderStaffBar(); renderCalendar(); };
    bar.appendChild(chip);
  });
}

// ══════════════════════
//  月曆
// ══════════════════════
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function renderCalendar() {
  const label = document.getElementById('monthLabel');
  label.textContent = `${currentYear} 年 ${currentMonth + 1} 月`;

  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const monthKey = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const monthData = (data[monthKey] || {})[currentStaff] || {};

  // 空格
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'day-cell empty';
    cal.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(currentYear, currentMonth, d);
    const dow = date.getDay();
    const dateStr = `${monthKey}-${String(d).padStart(2,'0')}`;
    const isToday = (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear());

    const cell = document.createElement('div');
    let cls = 'day-cell';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (isToday)  cls += ' today';
    cell.className = cls;
    cell.onclick = () => openModal(dateStr, d);

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    cell.appendChild(num);

    const shift = monthData[dateStr];
    if (shift && SHIFTS[shift]) {
      const badge = document.createElement('div');
      badge.className = `shift-badge ${SHIFTS[shift].cls}`;
      badge.textContent = SHIFTS[shift].name;
      cell.appendChild(badge);
    }

    cal.appendChild(cell);
  }
}

// ══════════════════════
//  選班 Modal
// ══════════════════════
function openModal(dateStr, d) {
  selectedDate = dateStr;
  const monthKey = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const monthData = (data[monthKey] || {})[currentStaff] || {};
  tempShift = monthData[dateStr] || null;

  const dow = ['日','一','二','三','四','五','六'][new Date(currentYear, currentMonth, d).getDay()];
  document.getElementById('modalDate').textContent =
    `${currentStaff}　${currentYear}/${currentMonth+1}/${d}（${dow}）`;

  // 清除選中狀態
  Object.keys(SHIFTS).forEach(k => {
    document.getElementById('opt-' + k).classList.toggle('selected', k === tempShift);
  });

  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
    tempShift = null;
  }
}

function selectShift(key) {
  tempShift = (tempShift === key) ? null : key;
  Object.keys(SHIFTS).forEach(k => {
    document.getElementById('opt-' + k).classList.toggle('selected', k === tempShift);
  });
}

function saveShift() {
  if (!selectedDate) return;
  const monthKey = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  if (!data[monthKey]) data[monthKey] = {};
  if (!data[monthKey][currentStaff]) data[monthKey][currentStaff] = {};

  if (tempShift) {
    data[monthKey][currentStaff][selectedDate] = tempShift;
  } else {
    delete data[monthKey][currentStaff][selectedDate];
  }

  saveData(data);
  document.getElementById('overlay').classList.remove('open');
  tempShift = null;
  renderCalendar();
}

function clearShift() {
  tempShift = null;
  Object.keys(SHIFTS).forEach(k => {
    document.getElementById('opt-' + k).classList.remove('selected');
  });
}

// ══════════════════════
//  統計
// ══════════════════════
function openStats() {
  document.getElementById('statsTitle').textContent =
    `${currentYear} 年 ${currentMonth+1} 月 統計`;

  const monthKey = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const body = document.getElementById('statsBody');
  body.innerHTML = '';

  STAFF.forEach(name => {
    const staffData = (data[monthKey] || {})[name] || {};
    const counts = {};
    Object.keys(SHIFTS).forEach(k => counts[k] = 0);
    Object.values(staffData).forEach(s => { if (counts[s] !== undefined) counts[s]++; });

    const card = document.createElement('div');
    card.className = 'stats-person';

    const nameEl = document.createElement('div');
    nameEl.className = 'sp-name';
    nameEl.textContent = `👤 ${name}`;
    card.appendChild(nameEl);

    const grid = document.createElement('div');
    grid.className = 'sp-grid';

    Object.entries(SHIFTS).forEach(([key, shift]) => {
      const item = document.createElement('div');
      item.className = 'sp-item';
      item.style.background = shift.color + '20';
      item.style.border = `1.5px solid ${shift.color}40`;

      const count = document.createElement('div');
      count.className = 'sp-count';
      count.style.color = shift.color;
      count.textContent = counts[key];

      const lbl = document.createElement('div');
      lbl.className = 'sp-label';
      lbl.style.color = shift.color;
      lbl.textContent = shift.name;

      item.appendChild(count);
      item.appendChild(lbl);
      grid.appendChild(item);
    });

    card.appendChild(grid);
    body.appendChild(card);
  });

  document.getElementById('statsOverlay').classList.add('open');
}

function closeStats() {
  document.getElementById('statsOverlay').classList.remove('open');
}
</script>

</body>
</html>
