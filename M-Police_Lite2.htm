    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
    body { background-color: var(--bg-light); color: var(--text-main); overflow-x: hidden; }

    /* --- 登入頁面 --- */
    #login-page { display: flex; flex-direction: column; align-items: center; padding: 40px 25px; height: 100vh; }
    .shield-logo { font-size: 50px; color: var(--police-blue); margin-bottom: 10px; }
    .title-group { text-align: center; margin-bottom: 40px; }
    .sub-title { font-size: 14px; letter-spacing: 4px; color: #7F8C8D; font-weight: bold; }
    .main-title { font-size: 26px; font-weight: 900; color: #34495E; }

    .form-group { width: 100%; margin-bottom: 15px; }
    label { display: block; font-size: 13px; color: var(--police-blue); font-weight: bold; margin-bottom: 5px; }
    input, select { 
        width: 100%; padding: 14px; border: 2px solid #D7DBDD; border-radius: 8px; 
        font-size: 16px; background: white; outline: none; transition: 0.3s;
    }
    input:focus { border-color: var(--police-blue); }

    .btn-main { 
        width: 100%; padding: 16px; background: var(--police-blue); color: white; 
        border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 20px;
        cursor: pointer; font-family: inherit;
    }
    .btn-main:active { opacity: 0.85; }
    .login-err { font-size: 13px; color: red; text-align: center; margin-top: 10px; min-height: 18px; font-weight: bold; }

    /* --- 查詢主頁面 --- */
    #main-page { display: none; padding-bottom: 80px; }
    .app-bar { 
        background: var(--police-blue); color: white; padding: 15px; 
        display: flex; justify-content: space-between; align-items: center;
        position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    
    .user-info-card { 
        background: white; margin: 15px; padding: 15px; border-radius: 10px;
        border-left: 5px solid var(--police-blue); box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .search-section { padding: 0 15px; }
    
    /* 查詢結果框 */
    .result-box { 
        margin: 15px; padding: 15px; background: #E3F2FD; border-radius: 8px;
        min-height: 150px; font-size: 15px; line-height: 1.8;
        border: 1px dashed var(--police-blue);
    }

    /* 查詢結果卡片樣式 */
    .result-found {
        background: white; border-radius: 8px; padding: 15px;
        border-left: 5px solid #1B5E20; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .result-found .r-title {
        font-size: 18px; font-weight: 900; color: #1B5E20; margin-bottom: 10px;
        padding-bottom: 8px; border-bottom: 1px solid #E8F5E9;
    }
    .result-found .r-row {
        display: flex; align-items: center; gap: 8px;
        padding: 5px 0; border-bottom: 1px solid #F5F5F5; font-size: 14px;
    }
    .result-found .r-row:last-child { border-bottom: none; }
    .result-found .r-key { color: #666; min-width: 80px; }
    .result-found .r-val { font-weight: bold; color: var(--text-main); }
    .result-found .r-val.blue { color: var(--police-blue); }
    .result-found .r-time {
        font-size: 11px; color: #aaa; text-align: right; margin-top: 10px;
    }

    .result-not-found {
        background: #FFF3E0; border-radius: 8px; padding: 15px;
        border-left: 5px solid #E65100; text-align: center;
    }

    /* 快速功能按鈕 */
    .quick-actions { 
        display: flex; justify-content: space-around; padding: 20px 10px; 
        background: white; border-top: 1px solid #ddd;
        position: fixed; bottom: 0; width: 100%;
    }
    .action-item { text-align: center; font-size: 11px; font-weight: bold; color: var(--police-blue); cursor: pointer; }
    .action-icon { 
        width: 45px; height: 45px; background: var(--police-blue); color: white; 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
        font-size: 20px; margin: 0 auto 5px; box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    }

    /* Loading 動畫 */
    .loading-box {
        text-align: center; padding: 20px; color: var(--police-blue);
    }
    .spinner {
        width: 30px; height: 30px; border: 3px solid #E3F2FD;
        border-top-color: var(--police-blue); border-radius: 50%;
        animation: spin 0.8s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 動畫 */
    .fade-in { animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>

    <div style="font-weight: bold; color: var(--police-blue);">使用者：<span id="disp-user">-</span></div>

<script>
// ══════════════════════════════
//  Firebase 設定
// ══════════════════════════════
const firebaseConfig = {
    apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48",
    databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com",
    projectId: "factor-security-d1965",
    appId: "1:864846943143:web:4cfa18cd20d2f712225c82"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db   = firebase.database();
const auth = firebase.auth();

// ══════════════════════════════
//  帳號設定
// ══════════════════════════════
const ACCOUNTS = {
    "admin":   "taiwan2024",
    "officer": "police2024",
    "manager": "elite2024"
};

// ══════════════════════════════
//  快取所有員工資料（登入後讀一次）
// ══════════════════════════════
let employeeCache = {}; // key → 員工資料

// ══════════════════════════════
//  登入
// ══════════════════════════════
function doLogin() {
    const id    = document.getElementById('login_id').value.trim();
    const pw    = document.getElementById('login_pw').value.trim();
    const mode  = document.getElementById('patrol_val').value;
    const err   = document.getElementById('loginErr');

    if (!id || !pw) { err.textContent = '請填寫帳號與密碼'; return; }
    if (!ACCOUNTS[id] || ACCOUNTS[id] !== pw) {
        err.textContent = '帳號或密碼錯誤';
        return;
    }

    err.textContent = '';
    localStorage.setItem('saved_id', id);
    localStorage.setItem('saved_patrol', mode);

    document.getElementById('disp-user').textContent = id;
    document.getElementById('disp-mode').textContent = mode;

    // 切換頁面
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('main-page').style.display  = 'block';
    document.getElementById('main-page').classList.add('fade-in');

    // Firebase 匿名登入後讀取資料
    auth.signInAnonymously().then(() => {
        preloadEmployees();
    }).catch(() => {
        preloadEmployees(); // 沒有網路也試試
    });
}

function doLogout() {
    auth.signOut();
    employeeCache = {};
    document.getElementById('main-page').style.display  = 'none';
    document.getElementById('login-page').style.display = 'flex';
    document.getElementById('login_pw').value = '';
    document.getElementById('loginErr').textContent = '';
    document.getElementById('query_res').innerHTML = '🛰️ 系統就緒，等待查詢指令...';
}

// Enter 鍵登入
document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') doLogin();
});

// ══════════════════════════════
//  預載所有員工資料
// ══════════════════════════════
function preloadEmployees() {
    const resBox = document.getElementById('query_res');
    resBox.innerHTML = `<div class="loading-box"><div class="spinner"></div>正在同步員工資料庫...</div>`;

    db.ref('employee_list').once('value').then(snap => {
        employeeCache = snap.val() || {};
        const count = Object.keys(employeeCache).length;
        resBox.innerHTML = `✅ 資料庫同步完成，共 <b>${count}</b> 筆員工資料<br><span style="font-size:13px;color:#888">可輸入：姓名、車牌號碼、工號</span>`;
    }).catch(() => {
        resBox.innerHTML = `<span style="color:red">❌ 資料庫連線失敗，請確認網路</span>`;
    });
}

// ══════════════════════════════
//  查詢邏輯（從快取搜尋）
// ══════════════════════════════
function doQuery() {
    const target = document.getElementById('query_input').value.trim();
    const resBox = document.getElementById('query_res');

    if (!target) {
        resBox.innerHTML = `<span style="color:orange">⚠️ 請輸入查詢內容</span>`;
        return;
    }

    const q = target.toLowerCase();

    // 搜尋符合的員工
    const results = Object.entries(employeeCache).filter(([key, p]) => {
        return (
            (p.name  || '').toLowerCase().includes(q) ||
            (p.id    || '').toLowerCase().includes(q) ||
            (p.plate || '').toLowerCase().includes(q) ||
            (p.reason|| '').toLowerCase().includes(q)
        );
    });

    if (results.length === 0) {
        resBox.innerHTML = `
            <div class="result-not-found">
                <div style="font-size:32px;margin-bottom:8px">🚫</div>
                <div style="font-weight:900;font-size:16px;color:#E65100">查無資料</div>
                <div style="font-size:13px;margin-top:6px;color:#666">「${target}」不在員工資料庫中</div>
            </div>`;
        return;
    }

    // 顯示所有符合結果
    resBox.innerHTML = results.map(([key, p]) => `
        <div class="result-found" style="margin-bottom:10px">
            <div class="r-title">✅ 查詢結果：${esc(p.name || '-')}</div>
            <div class="r-row">
                <span class="r-key">🪪 工號</span>
                <span class="r-val blue">${esc(p.id || key)}</span>
            </div>
            <div class="r-row">
                <span class="r-key">👤 姓名</span>
                <span class="r-val">${esc(p.name || '-')}</span>
            </div>
            <div class="r-row">
                <span class="r-key">🚗 車牌</span>
                <span class="r-val blue">${esc(p.plate || '未登記')}</span>
            </div>
            <div class="r-row">
                <span class="r-key">🏢 單位</span>
                <span class="r-val">${esc(p.reason || '-')}</span>
            </div>
            <div class="r-time">查詢時間：${new Date().toLocaleString()}</div>
        </div>
    `).join('');

    // 記錄查詢 log
    saveSearchLog(target, results.length);
}

// 底部快速按鈕提示
function filterQuery(type) {
    document.getElementById('query_input').placeholder = `輸入${type}...`;
    document.getElementById('query_input').focus();
}

// ══════════════════════════════
//  記錄查詢 Log（寫回 Firebase）
// ══════════════════════════════
function saveSearchLog(keyword, count) {
    const user = document.getElementById('disp-user').textContent;
    db.ref('search_logs').push({
        keyword,
        count,
        operator: user,
        time: new Date().toLocaleString()
    }).catch(() => {}); // 失敗就算了，不影響使用
}

// ══════════════════════════════
//  工具
// ══════════════════════════════
function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 自動填入上次帳號
window.onload = () => {
    if (localStorage.getItem('saved_id'))     document.getElementById('login_id').value    = localStorage.getItem('saved_id');
    if (localStorage.getItem('saved_patrol')) document.getElementById('patrol_val').value  = localStorage.getItem('saved_patrol');
};
</script>

</body>
